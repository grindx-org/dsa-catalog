name: Publish Testcase Bundle

on:
  push:
    tags:
      - "testcases-v*"

permissions:
  contents: write

jobs:
  release-testcases:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build testcase bundle
        run: |
          chmod +x scripts/build-testcases.sh
          scripts/build-testcases.sh \
            --output-dir dist/testcases-release \
            --release-tag "${GITHUB_REF_NAME}" \
            --min-app-version "0.2.4"

      - name: Publish testcase release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            dist/testcases-release/manifest.json
            dist/testcases-release/testcases.tar.gz
